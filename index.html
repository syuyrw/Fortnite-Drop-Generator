        <link rel="stylesheet" href="css/style.css?v=49" />

        <title id="page-title">Fortnite Drop Generator</title>

        <!-- Structured Data -->
        <script id="schema-json" type="application/ld+json">
            {
                "@context": "https://schema.org",
                "@type": "WebApplication",
                "name": "Fortnite Drop Generator",
                "url": "https://dropgenerator.com",
                "description": "Generate random Fortnite drop locations and POI spots with this interactive map tool.",
                "applicationCategory": "GameApplication",
                "operatingSystem": "All",
                "browserRequirements": "Requires JavaScript",
                "image": "https://fortnite-api.com/images/map.png",
                "author": {
                    "@type": "Person",
                    "name": "Jordan Reitz"
                },
                "creator": {
                    "@type": "Person",
                    "name": "Jordan Reitz"
                }
            }
        </script>

        <!-- Google Analytics -->
        <script
            async
            src="https://www.googletagmanager.com/gtag/js?id=G-1HWWMJBJS9"
        ></script>
        <script>
            window.dataLayer = window.dataLayer || [];
            function gtag() {
                dataLayer.push(arguments);
            }
            gtag("js", new Date());
            gtag("config", "G-1HWWMJBJS9");
        </script>
    </head>
    <body>
        <div class="container">
            <h1>Fortnite Random Drop<br>Generator</h1>
            <div class="button-box">
                <button class="drop-button" id="drop-button">Random POI</button>
                <button class="drop-button" id="rand-spot">Random Spot</button>
                <button class="drop-button" id="filter-button">Filter POIs</button>
            </div>
            <p id="click-counter">
                Total locations generated: <span id="total">0</span>
            </p>
            <div class="map-container">
                <div class="map" id="map">
                    <img
                        class="map-img"
                        src="https://fortnite-api.com/images/map.png"
                        alt="Interactive Fortnite Battle Royale map for generating random drop locations and POI spots"
                        title="Click to generate random Fortnite drop spots"
                        loading="lazy"
                        width="2048"
                        height="2048"
                    />
                    <span class="node-marker" id="node-marker"></span>
                </div>
            </div>
            <div class="history" id="history"></div>

            <!-- POI Filter Sidebar -->
            <div class="poi-sidebar" id="poi-sidebar">
                <div class="poi-sidebar-header">
                    <h2>Filter POIs</h2>
                    <button class="poi-sidebar-close" id="sidebar-close">×</button>
                </div>
                <div class="poi-sidebar-controls">
                    <button class="poi-control-btn" id="select-all">Select All</button>
                    <button class="poi-control-btn" id="deselect-all">Deselect All</button>
                </div>
                <div class="poi-list" id="poi-list"></div>
            </div>
            <div class="poi-sidebar-overlay" id="poi-overlay"></div>
        </div>

        <script>
            const version = new Date().getTime(); // unique on every load
            const script = document.createElement("script");
            script.src = `scripts/generator.js?v=${version}`;
            document.head.appendChild(script);
        </script>
    </body>
</html>
